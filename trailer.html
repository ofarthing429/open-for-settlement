<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open for Settlement - Trailer</title>
  <style>
    :root {
      --bg: #080a12;
      --panel: #14192a;
      --ink: #e7e1cf;
      --accent: #d6a64f;
      --edge: #3d4861;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 10%, #2c3349 0%, rgba(44, 51, 73, 0) 30%),
        radial-gradient(circle at 85% 20%, #472a2a 0%, rgba(71, 42, 42, 0) 34%),
        linear-gradient(180deg, #0d111a 0%, #080a12 100%);
      color: var(--ink);
      font-family: "Trebuchet MS", Verdana, sans-serif;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      border: 0;
      background: #000;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="trailerCanvas" width="960" height="540" aria-label="Open for Settlement trailer scene"></canvas>

  <script>
    const canvas = document.getElementById('trailerCanvas');
    const ctx = canvas.getContext('2d');

    const LOW_W = 480;
    const LOW_H = 270;
    const low = document.createElement('canvas');
    low.width = LOW_W;
    low.height = LOW_H;
    const g = low.getContext('2d');
    g.imageSmoothingEnabled = false;
    ctx.imageSmoothingEnabled = false;

    const DURATION = 19;
    let start = performance.now();
    window.addEventListener('click', () => { start = performance.now(); });

    function lerp(a, b, t) { return a + ((b - a) * t); }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function smoothstep(t) { return t * t * (3 - (2 * t)); }

    function drawBackground(t) {
      const sky = g.createLinearGradient(0, 0, 0, LOW_H);
      sky.addColorStop(0, '#1a2742');
      sky.addColorStop(0.45, '#2f2433');
      sky.addColorStop(1, '#161015');
      g.fillStyle = sky;
      g.fillRect(0, 0, LOW_W, LOW_H);

      g.fillStyle = '#89f0a1';
      g.fillRect(40, 38, 3, 3);
      g.fillRect(400, 52, 2, 2);
      g.fillRect(345, 34, 2, 2);

      const wave = Math.sin(t * 0.6) * 2;
      g.fillStyle = '#0c0c10';
      g.beginPath();
      g.moveTo(0, 174 + wave);
      g.quadraticCurveTo(90, 150 + wave, 180, 172 + wave);
      g.quadraticCurveTo(270, 192 + wave, 360, 170 + wave);
      g.quadraticCurveTo(430, 156 + wave, LOW_W, 176 + wave);
      g.lineTo(LOW_W, LOW_H);
      g.lineTo(0, LOW_H);
      g.closePath();
      g.fill();

      g.fillStyle = '#111115';
      g.beginPath();
      g.moveTo(0, 200);
      g.quadraticCurveTo(110, 178, 210, 202);
      g.quadraticCurveTo(320, 224, LOW_W, 194);
      g.lineTo(LOW_W, LOW_H);
      g.lineTo(0, LOW_H);
      g.closePath();
      g.fill();

    }

    function drawCrawler(x, y, stopped) {
      g.fillStyle = '#2a3242';
      g.fillRect(x - 18, y - 16, 36, 28);
      g.fillStyle = '#5a6f8d';
      g.fillRect(x - 10, y - 28, 20, 12);
      g.fillStyle = '#95a7c8';
      g.fillRect(x - 6, y - 24, 4, 4);
      g.fillRect(x + 2, y - 24, 4, 4);

      g.fillStyle = '#1d222e';
      g.fillRect(x - 20, y + 10, 40, 8);
      g.fillStyle = '#3a4255';
      for (let i = -16; i <= 12; i += 8) {
        g.fillRect(x + i, y + 12, 4, 4);
      }

      if (stopped) {
        g.fillStyle = '#f39b7d';
        g.fillRect(x + 18, y - 6, 6, 2);
      }
    }

    function drawBoom(x, y, p) {
      const r = 8 + (p * 34);
      g.fillStyle = '#f6c272';
      g.beginPath();
      g.arc(x, y, r, 0, Math.PI * 2);
      g.fill();
      g.fillStyle = '#ea6f4c';
      g.beginPath();
      g.arc(x, y, r * 0.58, 0, Math.PI * 2);
      g.fill();
    }

    function drawRumble(cx, groundY, p) {
      const wobble = Math.sin(p * 26) * 2;
      g.fillStyle = '#18171f';
      g.fillRect(cx - 26, groundY - 1, 52, 3);
      g.fillStyle = '#4a2f2f';
      g.fillRect(cx - 15 + wobble, groundY - 3, 30, 2);
      g.fillRect(cx - 9 - wobble, groundY + 2, 18, 2);
    }

    function drawWormStrike(cx, groundY, p) {
      // Rise -> swallow -> sink sequence.
      let riseFactor = 0;
      if (p < 0.35) {
        riseFactor = smoothstep(p / 0.35);
      } else if (p < 0.52) {
        riseFactor = 1;
      } else if (p < 0.88) {
        riseFactor = 1 - smoothstep((p - 0.52) / 0.36);
      } else {
        riseFactor = 0;
      }
      const rise = Math.floor(riseFactor * 26); // roughly half-way up the crawler top
      const swallowPhase = p >= 0.34 && p <= 0.56;
      const bodyLift = Math.floor(riseFactor * 12);

      g.fillStyle = '#0a0a0a';
      g.fillRect(cx - 30, groundY + 2, 60, 10);
      g.fillStyle = '#1a1416';
      g.fillRect(cx - 22, groundY, 44, 6);

      g.fillStyle = '#0f0f10';
      g.fillRect(cx - 50, groundY + 26 - rise, 100, 24 + bodyLift);
      g.fillStyle = '#242428';
      for (let i = 0; i < 5; i += 1) {
        g.fillRect(cx - 42 + i * 18, groundY + 30 - rise, 11, 14);
      }

      g.fillStyle = '#151517';
      g.fillRect(cx - 24, groundY + 14 - rise, 48, 24);
      g.fillStyle = '#2b1717';
      g.fillRect(cx - 16, groundY + 11 - rise, 32, 26);
      g.fillStyle = '#110707';
      g.fillRect(cx - 9, groundY + 16 - rise, 18, 14);

      // teeth/bony rim
      g.fillStyle = '#d2b287';
      g.fillRect(cx - 14, groundY + 9 - rise, 28, 5);
      g.fillRect(cx - 14, groundY + 35 - rise, 28, 5);
      g.fillStyle = '#f0dab2';
      g.fillRect(cx - 8, groundY + 10 - rise, 16, 2);
      g.fillRect(cx - 8, groundY + 36 - rise, 16, 2);

      // spike strip + red tips
      for (let i = 0; i < 6; i += 1) {
        const sx = cx - 38 + i * 14;
        const sh = 6 + ((i + Math.floor(p * 28)) % 2) * 3;
        g.fillStyle = '#2a2a2a';
        g.fillRect(sx, groundY + 11 - rise - sh, 7, sh);
        g.fillStyle = '#ff4c4c';
        g.fillRect(sx + 2, groundY + 9 - rise - sh, 3, 2);
      }

      if (swallowPhase) {
        g.fillStyle = 'rgba(10, 10, 14, 0.6)';
        g.fillRect(cx - 24, groundY - 44, 48, 64);
      }
    }

    function drawOverlayText(showTitle) {
      if (!showTitle) {
        return;
      }
      g.textAlign = 'center';
      g.textBaseline = 'middle';
      g.fillStyle = '#f0deb5';
      const topSize = 28;
      const bottomSize = 22;
      g.font = `bold ${topSize}px Trebuchet MS`;
      g.shadowColor = 'rgba(0, 0, 0, 0.7)';
      g.shadowBlur = 4;
      g.fillText('OPEN', LOW_W / 2, 18);
      g.font = `bold ${bottomSize}px Trebuchet MS`;
      g.fillText('FOR SETTLEMENT', LOW_W / 2, LOW_H - 18);
      g.shadowBlur = 0;
    }

    function frame(now) {
      const t = ((now - start) / 1000) % DURATION;
      g.clearRect(0, 0, LOW_W, LOW_H);

      let shakeX = 0;
      let shakeY = 0;
      if (t > 8.6 && t < 11.8) {
        shakeX = Math.sin(t * 40) * 3;
        shakeY = Math.cos(t * 32) * 3;
      }
      g.save();
      g.translate(shakeX, shakeY);

      drawBackground(t);
      const groundY = 208;

      const moveT = clamp(t / 8.2, 0, 1);
      const crawlerX = lerp(-60, 220, smoothstep(moveT));
      const crawlerY = groundY - 18;
      const stopped = t > 8.2;

      let swallowed = false;
      let wormP = 0;
      if (t > 10.1) {
        wormP = clamp((t - 10.1) / 4.2, 0, 1);
        swallowed = wormP > 0.36;
      }

      if (t > 8.6 && t < 10.1) {
        const rumbleP = clamp((t - 8.6) / 1.5, 0, 1);
        drawRumble(crawlerX + 4, groundY + 8, rumbleP);
      }

      if (!swallowed) {
        drawCrawler(crawlerX, crawlerY, stopped);
      }

      if (t > 9.4 && t < 10.5) {
        drawBoom(crawlerX, crawlerY - 6, clamp((t - 9.4) / 1.1, 0, 1));
      }

      if (t > 10.1 && wormP < 0.9) {
        drawWormStrike(crawlerX + 4, groundY + 8, wormP);
      }

      g.restore();
      const titleOn = t > 14.1;
      drawOverlayText(titleOn);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(low, 0, 0, canvas.width, canvas.height);
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
